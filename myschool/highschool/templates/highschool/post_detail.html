<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2b90d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                    },
                    fontFamily: {
                        "display": ["Lexend"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <title>{{ post.title }}</title>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen">
      <header class="bg-white shadow">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-6">
          <div>
            <h1 class="text-2xl font-bold">{{ post.title }}</h1>
            <p class="text-sm text-slate-600">Published {{ post.created_at|date:'F j, Y' }}</p>
          </div>
          <div class="flex gap-3">
            <a
              href="{% url 'highschool:post-list' %}"
              class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50"
              >Back</a
            >
            <a
              href="{% url 'highschool:post-update' post.pk %}"
              class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-slate-900 hover:brightness-110"
              >Edit</a
            >
          </div>
        </div>
      </header>

      <main class="mx-auto max-w-6xl px-6 py-10">
        <article class="rounded-2xl border border-slate-200 bg-white p-10 shadow-sm">
          <div class="prose max-w-none text-slate-800">
            {{ post.content|linebreaks }}
          </div>
        </article>
      </main>
    </div>
  </body>
</html>
