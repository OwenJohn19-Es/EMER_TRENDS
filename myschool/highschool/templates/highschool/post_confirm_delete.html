<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2b90d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                    },
                    fontFamily: {
                        "display": ["Lexend"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <title>Delete Post</title>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen">
      <header class="bg-white shadow">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-6">
          <div>
            <h1 class="text-2xl font-bold">Delete post</h1>
            <p class="text-sm text-slate-600">This action cannot be undone.</p>
          </div>
          <a
            href="{% url 'highschool:highschoolblog' %}"
            class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50"
            >Back</a
          >
        </div>
      </header>

      <main class="mx-auto max-w-4xl px-6 py-10">
        <div class="rounded-2xl border border-red-200 bg-white p-10 shadow-sm">
          <p class="text-lg font-semibold text-slate-800">Are you sure you want to delete this post?</p>
          <p class="mt-2 text-sm text-slate-600">"{{ object.title }}"</p>
          <form method="post" class="mt-6 flex items-center gap-3">
            {% csrf_token %}
            <button
              type="submit"
              class="rounded-lg bg-red-600 px-6 py-3 text-sm font-semibold text-white hover:bg-red-700"
            >
              Delete
            </button>
            <a
              href="{% url 'highschool:highschoolblog' %}"
              class="text-sm font-medium text-slate-600 hover:text-slate-800"
              >Cancel</a
            >
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
